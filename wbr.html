<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독특한 태그들 </title>
</head>
<body>
    <!-- figure + figcaption-->
    <figure><img src="./img/gallery-img-02.jpg" alt="놀이기구">
    <figcaption> 그림1. 놀이기구 </figcaption>
    </figure>

    <!-- mark-->
    <p> 이번 시험 범위는 <mark> 3장부터 5장까지 </mark>임</p>

    <!-- abbr : 마우스를 올려볼 것 -->
    <p> <abbr title="HyperText Markup Lana">HTML</abbr>마크업 언어임</p>

    <!-- wbr -->
    <p> 긴 주소 : https://www.<wbr>verylongdomainname<wbr>.example<wbr>.com/<wbr>path</p>

    <!-- translate="no" -->
    <p translate="no"> Galaxy, Genesis 같은 브랜드명은 번역되면 곤란 </p>

</body>
</html>
