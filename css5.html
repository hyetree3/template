<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    p {
        background: yellowgreen;
        width:100px;
        margin: 10px 20px auto;
    }
    .p1 {
    width: 50px;
    margin: auto;              /* 좌우 자동 → 가운데 */
    background: yellowgreen;
    }
    .p2 {
    width: 50px;
    margin: auto 0 auto auto;  /* 좌만 auto → 오른쪽 붙음 */
    background: aquamarine;
    }
    </style>
    <title>Document</title>
</head>
<body>
    <p> hello,world </p>

<div class="p1">p1</div>
<div class="p2">p2</div>

</body>
</html>
