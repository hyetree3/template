<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <style>
        body {
            font-family: '돋움';
            background: #ecedef;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color:#3b3a3a;
            font-size: 12px;
        }

        #year {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #222;
        }

        ul {
            list-style: none;
            padding: 0;
            width: 100%;
            max-width: 800px;
            background: #fff;
            border-top: 1px solid black;
            border-bottom: 1px solid gray;
        }

        li {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid #eee;
            font-size: 1rem;
        }
        
        li { 
            display: flex;
            justify-content: space-evenly;
        }
        img {
            width: 40px;
            height: 40px;
        }
        .col-rank {
            width: 50px ;
            text-align: center;
            padding-right: 12px;
        }
        .col-name {
            width: 200px ;
            text-align: left;
        }
        .col-num {
            width: 75px ;
            text-align: center;
        }
        .col-wpct {
            width: 75px ;
            text-align: center;
            color: rgb(35, 167, 220);
            font-weight: bold;
        }
        #team_head {
            text-align: center;
            background-color: #eee;
            height: 40px;
        }
        ul li:not(#team_head):nth-child(odd) {
            background-color: #f8f9fa;
        }
        footer {
            width: 100%;
            max-width: 800px;
            text-align: left;
            margin-top: 12px;
        }
    </style>
    <title>KBO리그 순위</title>
</head>
<body>
    <div id="year"></div>
    <ul>
        <li id="team_head">
        <span class="col-rank">순위</span>
        <span class="col-name">팀</span>
        <span class="col-num">경기</span>
        <span class="col-num">승</span>
        <span class="col-num">무</span>
        <span class="col-num">패</span>
        <span class="col-wpct">승률</span>
        <span class="col-num">게임차</span>
        <span class="col-num">연속</span>
        </li>
        <li id="rank0"></li>
        <li id="rank1"></li>
        <li id="rank2"></li>
        <li id="rank3"></li>
        <li id="rank4"></li>
        <li id="rank5"></li>
        <li id="rank6"></li>
        <li id="rank7"></li>
        <li id="rank8"></li>
        <li id="rank9"></li>
    </ul>

    <script>
        const sportinfo="https://prof-jwchi.github.io/kopo-front2026/Json/baseball.json";
        

        fetch(sportinfo) 
            .then((sportinfo_baseball) => {
                return sportinfo_baseball.json();
            })
            .then((data) => {
                const whatyear=document.getElementById("year");
                whatyear.innerHTML = `<strong>${data.season.nameMain}</strong>`;            
                data.list.sort((a, b) => a.rank.rank - b.rank.rank);
                data.list.forEach((team, index) => {
                   /* console.log(data.name);*/
                   /*순위 팀 경기 승 무 패 승률 게임차 연속 */
                    const baseballteam = document.getElementById(`rank${index}`); 
                    baseballteam.innerHTML =`
                    <span class="col-rank"><strong>${team.rank.rank}</strong></span>
                    <span class="col-name"><img src="${team.imageUrl}">${team.name} ></span>
                    <span class="col-num">${team.rank.game}</span>
                    <span class="col-num">${team.rank.win}</span>
                    <span class="col-num">${team.rank.draw}</span>
                    <span class="col-num">${team.rank.loss}</span>
                    <span class="col-wpct">${team.rank.wpct}</span>
                    <span class="col-num">${team.rank.gb}</span>
                    <span class="col-num">${team.rank.streak}</span>
                `;

                });
            })
        .catch((error) => {
            console.error("json 에러!",error);
        });
            </script>
    <footer>
    1, 2위 최종 순위는 한국시리즈 결과를 반영합니다.
    </footer>
</body>

</html>
